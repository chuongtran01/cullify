name: cullify

services:
  postgres:
    container_name: cullify-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cullify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cullify}
      POSTGRES_DB: ${POSTGRES_DB:-cullify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cullify} -d ${POSTGRES_DB:-cullify}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: cullify_postgres_data
